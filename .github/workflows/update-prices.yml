name: Aktualizace cen paliv

on:
  schedule:
    # Praha letní čas (CEST = UTC+2): 5:00 → 3:00 UTC, 10:00 → 8:00 UTC, 15:00 → 13:00 UTC
    # Praha zimní čas (CET  = UTC+1): spustí se v 4:00, 9:00, 14:00 místního času (1 h posun)
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalace závislostí
        run: pip install -r scraper/requirements.txt

      - name: Stažení reálných cen z mbenzin.cz + OSM stanic
        run: python scraper/build_osm_data.py

      - name: Aktualizace 90denní historie
        run: python scraper/build_history.py

      - name: Commit a push dat
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          git diff --cached --quiet || git commit -m "ceny: aktualizace $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push

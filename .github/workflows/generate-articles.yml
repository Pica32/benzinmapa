name: Generování článků (2× denně)

on:
  schedule:
    # Praha letní čas (CEST = UTC+2): 7:00 → 5:00 UTC, 15:00 → 13:00 UTC
    # Spouští se hodinu po aktualizaci cen → má čerstvá data pro články
    - cron: '0 5 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalace závislostí
        run: pip install -r scraper/requirements.txt

      - name: Generování komplexních článků (RSS → AI → FTP)
        working-directory: scraper
        env:
          AI_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: deepseek/deepseek-r1:free
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
          SITE_URL: https://benzinmapa.cz
          SITE_NAME: BenzinMapa.cz
          DRY_RUN: "false"
        run: python main.py --once

      - name: Uložení stavu bota
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/state.json scraper/dedupe_index.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: články $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
